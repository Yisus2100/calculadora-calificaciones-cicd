name: Despliegue continuo en GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Verificar y construir
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v7

      - name: Preparar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependencias de forma reproducible
        run: npm ci

      - name: Validar sintaxis
        run: npm run check

      - name: Ejecutar pruebas automatizadas
        run: npm test

      - name: Construir la carpeta dist
        run: npm run build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v6

      - name: Cargar el artefacto de GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    name: Publicar en GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Desplegar el artefacto
        id: deployment
        uses: actions/deploy-pages@v5
